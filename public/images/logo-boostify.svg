<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="splash" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Orange splash background -->
  <path d="M40,120 Q20,90 45,60 Q70,30 110,35 Q150,40 165,70 Q180,100 160,130 Q140,160 100,165 Q60,170 45,140 Z" fill="#F5A623" filter="url(#splash)" opacity="0.95"/>
  <!-- Black letter B -->
  <text x="100" y="138" font-family="Georgia, 'Times New Roman', serif" font-size="115" font-weight="900" fill="#111" text-anchor="middle">B</text>
  <!-- Boostify text -->
  <text x="100" y="175" font-family="'Montserrat', Arial, sans-serif" font-size="22" font-weight="700" fill="#111" text-anchor="middle">oostify</text>
</svg>